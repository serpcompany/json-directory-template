name: Validate Listing Data

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'data/websites.json'
  push:
    branches:
      - main
    paths:
      - 'data/websites.json'

concurrency:
  group: validate-listing-data-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-listing-data:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Validate data/websites.json
        run: pnpm tsx scripts/validate-data.ts data/websites.json
