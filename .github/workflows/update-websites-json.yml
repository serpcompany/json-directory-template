name: Validate Website Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/websites.json"

concurrency:
  group: validate-website-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-website-data:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Validate websites.json
        run: pnpm tsx scripts/validate-data.ts data/websites.json
