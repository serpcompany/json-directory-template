name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'data/listings.json'
      - 'sites/**'
      - 'apps/starter/**'
      - 'scripts/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Checked-in site config id'
        required: true
        default: 'default'
      deploy_repo:
        description: 'Deploy target repo (owner/repo)'
        required: false
      deploy_branch:
        description: 'Deploy target branch'
        required: false
        default: 'main'

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Data
    runs-on: self-hosted
    outputs:
      artifact_dir: ${{ steps.resolve.outputs.artifact_dir }}
      site_id: ${{ steps.resolve.outputs.site_id }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Resolve build input
        id: resolve
        env:
          SITE_ID: ${{ github.event.inputs.site_id || vars.SITE_ID || 'default' }}
        run: ./node_modules/.bin/tsx scripts/resolve-build-run.ts >> "$GITHUB_OUTPUT"

      - name: Validate site data
        env:
          SITE_ID: ${{ steps.resolve.outputs.site_id }}
        run: pnpm validate:site

  build:
    name: Build
    needs: validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Build static site
        env:
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm build:site

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ needs.validate.outputs.artifact_dir }}/
          retention-days: 1

  deploy:
    name: Deploy to Repo
    needs: [validate, build]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ${{ needs.validate.outputs.artifact_dir }}

      - name: Verify deploy auth
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Missing GH_PAT secret required for cross-repo deploy."
            exit 1
          fi

      - name: Deploy
        env:
          DEPLOY_REPO_URL: ${{ github.event.inputs.deploy_repo || vars.DEPLOY_REPO_URL || '' }}
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || vars.DEPLOY_BRANCH || 'main' }}
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm deploy:site
