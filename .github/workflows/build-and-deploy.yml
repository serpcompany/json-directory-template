name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'data/websites.json'
      - 'sites/**'
      - 'tmp/**'
      - 'apps/web/**'
      - 'scripts/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Checked-in site definition id'
        required: false
        default: 'serpdownloaders'
      build_spec_path:
        description: 'Explicit BuildSpec path when using a checked-in or supplied spec'
        required: false
      deploy_repo:
        description: 'Deploy target repo (owner/repo)'
        required: false
      deploy_branch:
        description: 'Deploy target branch'
        required: false
        default: 'main'

concurrency:
  group: build-deploy-${{ github.ref }}-${{ github.event.inputs.build_spec_path || github.event.inputs.site_id || vars.SITE_ID || 'serpdownloaders' }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Data
    runs-on: self-hosted
    outputs:
      artifact_dir: ${{ steps.resolve.outputs.artifact_dir }}
      site_id: ${{ steps.resolve.outputs.site_id }}
      spec_path: ${{ steps.resolve.outputs.spec_path }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Resolve build input
        id: resolve
        env:
          BUILD_SPEC_PATH: ${{ github.event.inputs.build_spec_path || vars.BUILD_SPEC_PATH || '' }}
          SITE_ID: ${{ github.event.inputs.site_id || vars.SITE_ID || 'serpdownloaders' }}
        run: ./node_modules/.bin/tsx scripts/resolve-build-run.ts >> "$GITHUB_OUTPUT"

      - name: Validate site data
        env:
          BUILD_SPEC_PATH: ${{ steps.resolve.outputs.spec_path }}
          SITE_ID: ${{ steps.resolve.outputs.site_id }}
        run: pnpm validate:site

  build:
    name: Build
    needs: validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Build static site
        env:
          BUILD_SPEC_PATH: ${{ needs.validate.outputs.spec_path }}
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm build:site

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ needs.validate.outputs.artifact_dir }}/
          retention-days: 1

  deploy:
    name: Deploy to Repo
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ${{ needs.validate.outputs.artifact_dir }}

      - name: Deploy
        env:
          BUILD_SPEC_PATH: ${{ needs.validate.outputs.spec_path }}
          DEPLOY_REPO_URL: ${{ github.event.inputs.deploy_repo || vars.DEPLOY_REPO_URL || '' }}
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || vars.DEPLOY_BRANCH || 'main' }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm deploy:site
