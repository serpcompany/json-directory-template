name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'data/listings.json'
      - 'sites/**'
      - 'apps/browserextensions.io/**'
      - 'apps/pornvideodownloaders.com/**'
      - 'apps/serp.ai/**'
      - 'apps/serp.co/**'
      - 'apps/serp.software/**'
      - 'apps/serpdownloaders.com/**'
      - 'apps/starter/**'
      - 'packages/web-core/**'
      - 'scripts/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Checked-in site config id'
        required: true

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  resolve:
    name: Resolve Deploy Targets
    runs-on: self-hosted
    outputs:
      deploy_targets: ${{ steps.resolve.outputs.deploy_targets }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Resolve build input
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SITE_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.site_id || '' }}
          NEXT_PUBLIC_SITE_ID: ''
        run: ./node_modules/.bin/tsx scripts/resolve-build-run.ts >> "$GITHUB_OUTPUT"

  deploy:
    name: Validate, Build & Deploy (${{ matrix.target.siteId }})
    needs: resolve
    if: needs.resolve.outputs.should_deploy == 'true'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve.outputs.deploy_targets) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Validate site data
        env:
          SITE_ID: ${{ matrix.target.siteId }}
        run: pnpm validate:site

      - name: Build static site
        env:
          SITE_ID: ${{ matrix.target.siteId }}
        run: pnpm build:site

      - name: Audit XML sitemaps
        env:
          SITE_ID: ${{ matrix.target.siteId }}
        run: pnpm audit:sitemaps -- --site "$SITE_ID"

      - name: Audit forbidden listing links
        env:
          SITE_ID: ${{ matrix.target.siteId }}
        run: pnpm audit:forbidden-links -- --site "$SITE_ID"

      - name: Verify deploy auth
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Missing GH_PAT secret required for cross-repo deploy."
            exit 1
          fi

      - name: Deploy
        env:
          ALLOW_DEPLOY_TARGET_OVERRIDE: ''
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
          DEPLOY_BRANCH: ''
          DEPLOY_REPO_URL: ''
          SITE_ID: ${{ matrix.target.siteId }}
        run: pnpm deploy:site
