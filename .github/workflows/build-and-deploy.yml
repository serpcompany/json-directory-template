name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'data/listings.json'
      - 'sites/**'
      - 'apps/starter/**'
      - 'packages/web-core/**'
      - 'scripts/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Checked-in site config id'
        required: true
        default: 'default'

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Data
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    outputs:
      artifact_dir: ${{ steps.resolve.outputs.artifact_dir }}
      site_id: ${{ steps.resolve.outputs.site_id }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Resolve build input
        id: resolve
        env:
          SITE_ID: ${{ github.event.inputs.site_id || vars.SITE_ID || 'default' }}
        run: ./node_modules/.bin/tsx scripts/resolve-build-run.ts >> "$GITHUB_OUTPUT"

      - name: Validate site data
        env:
          SITE_ID: ${{ steps.resolve.outputs.site_id }}
        run: pnpm validate:site

  build:
    name: Build
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Build static site
        env:
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm build:site

      - name: Audit XML sitemaps
        env:
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm audit:sitemaps -- --site "$SITE_ID"

      - name: Audit forbidden listing links
        env:
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm audit:forbidden-links -- --site "$SITE_ID"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ needs.validate.outputs.artifact_dir }}/
          retention-days: 1

  deploy:
    name: Deploy to Repo
    if: github.event_name == 'workflow_dispatch'
    needs: [validate, build]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ${{ needs.validate.outputs.artifact_dir }}

      - name: Verify deploy auth
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Missing GH_PAT secret required for cross-repo deploy."
            exit 1
          fi

      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
          SITE_ID: ${{ needs.validate.outputs.site_id }}
        run: pnpm deploy:site

  deploy-active-sites:
    name: Deploy Active Site (${{ matrix.site_id }})
    if: github.event_name == 'push'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        site_id:
          - browserextensions.io
          - pornvideodownloaders.com
          - serp.ai
          - serp.co
          - serp.software
          - serpdownloaders.com
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Validate site data
        env:
          SITE_ID: ${{ matrix.site_id }}
        run: pnpm validate:site

      - name: Build static site
        env:
          SITE_ID: ${{ matrix.site_id }}
        run: pnpm build:site

      - name: Audit XML sitemaps
        env:
          SITE_ID: ${{ matrix.site_id }}
        run: pnpm audit:sitemaps -- --site "$SITE_ID"

      - name: Audit forbidden listing links
        env:
          SITE_ID: ${{ matrix.site_id }}
        run: pnpm audit:forbidden-links -- --site "$SITE_ID"

      - name: Verify deploy auth
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Missing GH_PAT secret required for cross-repo deploy."
            exit 1
          fi

      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAT }}
          SITE_ID: ${{ matrix.site_id }}
        run: pnpm deploy:site
