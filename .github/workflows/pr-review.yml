name: PR Review

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/actions/install

      - name: Validate active checked-in sites
        run: pnpm validate:sites

      - name: Run Biome Check
        run: pnpm exec biome check --changed --since=origin/main --no-errors-on-unmatched

      - name: Run forbidden listing link guard
        run: pnpm lint:forbidden-links

      - name: Run repository policy tests
        run: pnpm test:repo

      - name: Run type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  # links:
  #   name: Check Links
  #   runs-on: self-hosted
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v6

  #     - name: Check Links
  #       uses: lycheeverse/lychee-action@v2.2.0
  #       with:
  #         args: --config ./lychee.toml --verbose --no-progress .
  #         fail: true

  changes:
    name: Detect changes
    runs-on: self-hosted
    outputs:
      e2e_relevant: ${{ steps.filter.outputs.e2e_relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for e2e-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            e2e_relevant:
              - 'apps/starter/app/**'
              - 'apps/starter/components/**'
              - 'apps/starter/lib/**'
              - 'apps/starter/public/**'
              - 'apps/e2e/**'
              - 'packages/ui/**'

  e2e:
    name: E2E Tests
    needs: [validate, changes]
    if: needs.changes.outputs.e2e_relevant == 'true'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install

      - name: Install Playwright Browsers
        run: pnpm --filter e2e test:install

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
