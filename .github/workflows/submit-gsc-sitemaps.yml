name: Submit GSC Sitemaps

on:
  workflow_dispatch:
    inputs:
      stale_sitemap_urls:
        description: 'Optional newline or comma separated stale sitemap URLs to delete before submit'
        required: false
        type: string
  schedule:
    - cron: '17 9 * * *'

jobs:
  submit:
    name: Submit sitemap indexes
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install

      - name: Verify Search Console credentials
        env:
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GSC_SERVICE_ACCOUNT_JSON" ]; then
            exit 0
          fi

          if [ -n "$GSC_OAUTH_CLIENT_ID" ] && [ -n "$GSC_OAUTH_CLIENT_SECRET" ] && [ -n "$GSC_OAUTH_REFRESH_TOKEN" ]; then
            exit 0
          fi

          {
            echo "Missing Search Console credentials."
            echo "Set either GSC_SERVICE_ACCOUNT_JSON or all OAuth secrets:"
            echo "GSC_OAUTH_CLIENT_ID, GSC_OAUTH_CLIENT_SECRET, GSC_OAUTH_REFRESH_TOKEN."
          } >&2
          exit 1

      - name: Submit sitemaps
        env:
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL_MAP: ${{ vars.GSC_SITE_URL_MAP }}
          GSC_STALE_SITEMAP_URLS: ${{ github.event.inputs.stale_sitemap_urls || vars.GSC_STALE_SITEMAP_URLS }}
        run: pnpm tsx scripts/submit-gsc-sitemaps.ts
