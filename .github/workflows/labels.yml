name: Label PRs

on:
  - pull_request_target

jobs:
  triage:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: self-hosted

    steps:
      - name: Ensure managed labels exist
        uses: actions/github-script@v8
        with:
          script: |
            const labelDefinitions = [
              {
                name: 'area:content',
                color: '0E8A16',
                description: 'Touches active listing-entry source files such as data/listings.json or sites/**/products.json.'
              }
            ]

            const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            })

            const existingByName = new Map(
              existingLabels.map(label => [label.name, label])
            )

            for (const definition of labelDefinitions) {
              const existing = existingByName.get(definition.name)

              if (!existing) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...definition
                })
                continue
              }

              if (
                existing.color.toLowerCase() !== definition.color.toLowerCase() ||
                (existing.description ?? '') !== definition.description
              ) {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: definition.name,
                  new_name: definition.name,
                  color: definition.color,
                  description: definition.description
                })
              }
            }

      - uses: actions/labeler@v6
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
          sync-labels: true
